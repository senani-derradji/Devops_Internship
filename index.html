<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple FastAPI Page</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f7f9fc; color: #20232a; }
    .card { background: white; border-radius: 12px; padding: 24px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    button { padding: 10px 18px; border: none; border-radius: 8px; background: #0078d4; color: white; cursor: pointer; }
    button:hover { background: #005fa3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from FastAPI</h1>
    <p>This is a simple page served by a FastAPI app on <strong>localhost:8000</strong>.</p>
    <button id="messageButton">Click me</button>
    <p id="message"></p>
  </div>
  <script>
    document.getElementById('messageButton').addEventListener('click', () => {
      document.getElementById('message').textContent = 'FastAPI + HTML + JavaScript works!';
    });
  </script>
</body>
</html>
