trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'
  imageRepository: 'derradjisenani/devops-codealpha-internship'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

stages:

- stage: Build
  displayName: Build & Test

  jobs:
  - job: Build

    steps:
    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: Install Dependencies

    - script: |
        pytest
      displayName: Run Tests

    - script: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.66.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.66.0_Linux-64bit.deb
      displayName: Install Trivy

    - script: |
        trivy fs \
          --severity HIGH,CRITICAL \
          --format table \
          .
      displayName: Trivy Filesystem Scan


- stage: Docker

  dependsOn: Build

  jobs:

  - job: Docker

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: derradji
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          latest
          $(tag)

    - script: |
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.66.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.66.0_Linux-64bit.deb
      displayName: Install Trivy

    - script: |
        trivy image \
          --severity HIGH,CRITICAL \
          --format table \
          $(imageRepository):latest

      displayName: Trivy Image Scan

    - script: |
        trivy image \
          --format sarif \
          --output trivy-results.sarif \
          $(imageRepository):latest

      displayName: Generate Trivy Report

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: trivy-results.sarif
        ArtifactName: Trivy-Report